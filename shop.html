<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop & Booking</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Shop & Booking</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop & Booking</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="booking">
      <h2>Book Tickets</h2>
      <form id="booking-form">
        <label for="name">Full Name:</label>
        <input type="text" id="name" required>
        
        <label for="tickets">Number of Tickets:</label>
        <input type="number" id="tickets" min="1" required>
        
        <button type="submit">Book Now</button>
      </form>
      <p id="booking-message"></p>
    </section>

    <section id="shop">
      <h2>Merchandise</h2>
      <form id="shop-form">
        <label for="item">Select Item:</label>
        <select id="item" required>
          <option value="Jersey">Club Jersey</option>
          <option value="Scarf">Club Scarf</option>
          <option value="Cap">Club Cap</option>
        </select>
        
        <button type="submit">Add to Cart</button>
      </form>
      <ul id="cart-list"></ul> <!-- Populated dynamically -->
    </section>
  </main>

  <footer>
    <p>&copy; 2026 My Club. All rights reserved.</p>
  </footer>
   <script src="script.js" defer></script>
</body>
</html>
